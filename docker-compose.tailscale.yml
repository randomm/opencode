services:
  # Tailscale VPN sidecar
  tailscale:
    image: tailscale/tailscale:latest
    container_name: opencode_tailscale
    hostname: opencode-server
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}  # From user's Tailscale admin
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      - remory_network
    restart: unless-stopped

  # OpenCode with SSH server
  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode-ssh
    container_name: opencode_with_ssh
    network_mode: "service:tailscale"  # Share Tailscale's network
    depends_on:
      - tailscale
    volumes:
      - ~/git:/workspace
      - ~/.gitconfig:/home/opencode/.gitconfig:ro
      - opencode-ssh:/home/opencode/.ssh
    environment:
      - OPENCODE_CONFIG=/config/opencode.container.json
    restart: unless-stopped

volumes:
  tailscale-state:
    driver: local
  opencode-ssh:
    driver: local

networks:
  remory_network:
    external: true
